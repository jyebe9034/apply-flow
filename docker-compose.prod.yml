version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: applyflow-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - applyflow-network

  backend:
    build:
      context: ./backend/applyflow
      dockerfile: Dockerfile
    container_name: applyflow-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - applyflow-network

  frontend:
    build:
      context: ./frontend/applyFlow
      dockerfile: Dockerfile
    container_name: applyflow-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
    depends_on:
      - backend
    networks:
      - applyflow-network

  nginx:
    image: nginx:alpine
    container_name: applyflow-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - applyflow-network

networks:
  applyflow-network:
    driver: bridge

volumes:
  postgres-data:

